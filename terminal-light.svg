<svg width="100%" height="100%" viewBox="0 0 1180 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Noor GitHub profile</title>
  <desc id="desc">Clean terminal-style profile banner for Abdullah Noor.</desc>
  <defs>
    <clipPath id="clip"><rect x="16" y="16" width="1148" height="388" rx="22"/></clipPath>
    <linearGradient id="border" x1="0" y1="0" x2="1180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity=".08"/>
      <stop offset=".5" stop-color="#0F172A" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity=".08"/>
      <animate attributeName="x1" values="-180;0;-180" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1000;1180;1000" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity=".12"/>
    </filter>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace}
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    </style>
  </defs>
  <rect width="1180" height="420" rx="28" fill="#F8FAFC"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="22" stroke="#E2E8F0"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="22" stroke="url(#border)"/>
  <g clip-path="url(#clip)">
    <rect x="46" y="46" width="1088" height="328" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
    <rect x="46" y="46" width="1088" height="42" rx="16" fill="#F1F5F9"/>
    <circle cx="74" cy="67" r="5.5" fill="#EF4444"/>
    <circle cx="96" cy="67" r="5.5" fill="#F59E0B"/>
    <circle cx="118" cy="67" r="5.5" fill="#22C55E"/>
    <text x="590" y="72" class="mono" font-size="13" text-anchor="middle" fill="#64748B">profile</text>

    <text x="88" y="170" class="mono" font-size="22" fill="#475569">$ whoami</text>
    <text x="88" y="250" class="sans" font-size="72" font-weight="850" letter-spacing="-1.5" fill="#0F172A">Abdullah Noor</text>
    <rect x="210" y="150" width="11" height="26" rx="1.5" fill="#0F172A">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
