<svg width="100%" height="100%" viewBox="0 0 1180 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Noor GitHub profile</title>
  <desc id="desc">Black terminal-style profile banner for Abdullah Noor with resume highlights.</desc>
  <defs>
    <clipPath id="outerClip"><rect x="16" y="16" width="1148" height="388" rx="22"/></clipPath>
    <linearGradient id="edge" x1="-160" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#404040" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#FAFAFA" stop-opacity=".32"/>
      <stop offset="1" stop-color="#404040" stop-opacity=".12"/>
      <animate attributeName="x1" values="-160;40;-160" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1040;1240;1040" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="drop" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity=".62"/>
    </filter>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace}
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .muted{fill:#A3A3A3}
      .soft{fill:#737373}
      .white{fill:#FAFAFA}
      .line{stroke:#262626}
      .chip{fill:#0A0A0A;stroke:#2A2A2A}
    </style>
  </defs>

  <rect width="1180" height="420" rx="28" fill="#000000"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="22" stroke="#181818"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="22" stroke="url(#edge)"/>

  <g clip-path="url(#outerClip)">
    <rect x="44" y="44" width="1092" height="332" rx="16" fill="#050505" stroke="#202020" filter="url(#drop)"/>
    <rect x="44" y="44" width="1092" height="42" rx="16" fill="#0A0A0A"/>
    <circle cx="73" cy="65" r="5.5" fill="#EF4444"/>
    <circle cx="95" cy="65" r="5.5" fill="#F59E0B"/>
    <circle cx="117" cy="65" r="5.5" fill="#22C55E"/>
    <text x="590" y="70" class="mono soft" font-size="13" text-anchor="middle">abdullah-noor/profile</text>

    <g transform="translate(76 112)">
      <text class="mono muted" font-size="16">$ cat profile.md</text>
      <text y="51" class="sans white" font-size="48" font-weight="850" letter-spacing="-1.1">Abdullah Noor</text>
      <text y="87" class="sans muted" font-size="20">Founder &amp; Lead Engineer, STROKIX</text>
      <text y="119" class="mono soft" font-size="14">San Francisco Bay Area | SJSU CS &amp; Computer Engineering | May 2027</text>

      <line x1="0" y1="148" x2="470" y2="148" class="line"/>

      <text y="183" class="mono muted" font-size="15">$ focus</text>
      <text y="211" class="sans white" font-size="17">Secure multi-tenant AI systems, agent workflows, and polished web products.</text>
      <text y="242" class="mono soft" font-size="14">linkedin.com/in/abdullah-noor1</text>
      <text y="265" class="mono soft" font-size="14">abdullahnoorllc@gmail.com</text>
    </g>

    <line x1="584" y1="112" x2="584" y2="340" class="line"/>

    <g transform="translate(626 112)">
      <text class="mono muted" font-size="16">$ experience --highlights</text>
      <text y="39" class="sans white" font-size="21" font-weight="760">STROKIX - AI operating system for business teams</text>
      <text y="68" class="mono muted" font-size="14">solo-built production platform | 33 workplace integrations | OAuth 2.0</text>

      <g class="sans muted" font-size="15">
        <text y="104">- Secure agent framework: AES-256-GCM, PostgreSQL RLS, HITL approvals</text>
        <text y="130">- HMAC-signed audit logs, tenant isolation, encrypted credentials</text>
        <text y="156">- Persistent memory with PII redaction, pgvector retrieval, SSE streaming chat</text>
        <text y="182">- Model routing, autonomous agents, Celery workers, production deployment</text>
      </g>

      <text y="224" class="mono muted" font-size="15">$ projects</text>
      <text y="250" class="sans white" font-size="16">VentureMind, DimeADozen, RoofDynamics, Phone Terminal</text>

      <g transform="translate(0 280)" class="mono" font-size="13">
        <rect class="chip" width="66" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">React</text>
        <g transform="translate(76 0)"><rect class="chip" width="78" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Next.js</text></g>
        <g transform="translate(164 0)"><rect class="chip" width="92" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">TypeScript</text></g>
        <g transform="translate(266 0)"><rect class="chip" width="74" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Python</text></g>
        <g transform="translate(350 0)"><rect class="chip" width="82" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">FastAPI</text></g>
        <g transform="translate(442 0)"><rect class="chip" width="92" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Postgres</text></g>
      </g>
      <g transform="translate(0 318)" class="mono" font-size="13">
        <rect class="chip" width="84" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">LangGraph</text>
        <g transform="translate(94 0)"><rect class="chip" width="48" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">RAG</text></g>
        <g transform="translate(152 0)"><rect class="chip" width="80" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">pgvector</text></g>
        <g transform="translate(242 0)"><rect class="chip" width="70" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Docker</text></g>
        <g transform="translate(322 0)"><rect class="chip" width="60" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Fly.io</text></g>
        <g transform="translate(392 0)"><rect class="chip" width="76" height="28" rx="7"/><text x="14" y="19" fill="#E5E5E5">Security</text></g>
      </g>
    </g>

    <rect x="218" y="292" width="9" height="19" rx="1.5" fill="#E5E5E5">
      <animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
