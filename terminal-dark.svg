<svg width="100%" height="100%" viewBox="0 0 1180 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Noor terminal profile</title>
  <desc id="desc">Simple terminal-style GitHub profile banner for Abdullah Noor.</desc>
  <defs>
    <clipPath id="clip"><rect x="16" y="16" width="1148" height="388" rx="24"/></clipPath>
    <linearGradient id="border" x1="120" y1="0" x2="1060" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/><stop offset=".52" stop-color="#22D3EE"/><stop offset="1" stop-color="#10B981"/>
      <animate attributeName="x1" values="80;180;80" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="980;1100;980" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 80) scale(340 180)">
      <stop stop-color="#22D3EE" stop-opacity=".16"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000" flood-opacity=".38"/></filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
  </defs>
  <rect width="1180" height="420" rx="28" fill="#030712"/>
  <rect width="1180" height="420" fill="url(#glow)"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="24" stroke="#1E293B"/>
  <rect x="16.5" y="16.5" width="1147" height="387" rx="24" stroke="url(#border)" stroke-opacity=".5" stroke-dasharray="280 1000">
    <animate attributeName="stroke-dashoffset" values="0;-1280" dur="12s" repeatCount="indefinite"/>
  </rect>
  <g clip-path="url(#clip)">
    <rect x="44" y="44" width="1092" height="332" rx="18" fill="#0B1120" stroke="#1E293B" filter="url(#shadow)"/>
    <rect x="44" y="44" width="1092" height="42" rx="18" fill="#111827"/>
    <circle cx="72" cy="65" r="6" fill="#EF4444"/><circle cx="94" cy="65" r="6" fill="#F59E0B"/><circle cx="116" cy="65" r="6" fill="#22C55E"/>
    <text x="590" y="70" class="mono" font-size="13" text-anchor="middle" fill="#64748B">~/abdullah-noor/profile</text>

    <text x="82" y="132" class="mono" font-size="18" fill="#22C55E">$ whoami</text>
    <text x="82" y="184" class="sans" font-size="54" font-weight="850" letter-spacing="-1.4" fill="#F8FAFC">Abdullah Noor</text>
    <text x="84" y="226" class="sans" font-size="24" fill="#94A3B8">Full-stack developer building AI products, secure tooling, and polished web systems.</text>

    <text x="82" y="286" class="mono" font-size="18" fill="#22C55E">$ skills --top</text>
    <g transform="translate(82 312)" class="sans" font-size="14" font-weight="750">
      <g><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="17" y="25" fill="#61DAFB">⚛</text><text x="48" y="25" fill="#F8FAFC" text-anchor="middle">React</text></g>
      <g transform="translate(108 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#3178C6">TS</text><text x="62" y="25" fill="#F8FAFC" text-anchor="middle">TypeScript</text></g>
      <g transform="translate(216 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#F8FAFC">▲</text><text x="58" y="25" fill="#F8FAFC" text-anchor="middle">Next</text></g>
      <g transform="translate(324 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#68A063">⬢</text><text x="56" y="25" fill="#F8FAFC" text-anchor="middle">Node</text></g>
      <g transform="translate(432 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#FFD43B">Py</text><text x="62" y="25" fill="#F8FAFC" text-anchor="middle">Python</text></g>
      <g transform="translate(540 0)"><rect width="104" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#336791">●</text><text x="66" y="25" fill="#F8FAFC" text-anchor="middle">Postgres</text></g>
      <g transform="translate(656 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#2496ED">▣</text><text x="60" y="25" fill="#F8FAFC" text-anchor="middle">Docker</text></g>
      <g transform="translate(764 0)"><rect width="96" height="38" rx="10" fill="#0F172A" stroke="#263244"/><text x="18" y="25" fill="#F24E1E">◆</text><text x="58" y="25" fill="#F8FAFC" text-anchor="middle">Figma</text></g>
    </g>
    <text x="82" y="366" class="mono" font-size="15" fill="#64748B">linkedin.com/in/abdullah-noor1 · abdullahnoorllc@gmail.com</text>
    <rect x="634" y="272" width="10" height="22" rx="2" fill="#22D3EE"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
</svg>
