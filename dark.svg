<svg width="100%" height="100%" viewBox="0 0 1180 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Noor GitHub profile</title>
  <desc id="desc">A minimal animated profile banner for Abdullah Noor.</desc>
  <defs>
    <clipPath id="clip"><rect x="10" y="10" width="1160" height="500" rx="32"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/><stop offset=".5" stop-color="#07111E"/><stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <radialGradient id="a" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 80) rotate(110) scale(430 260)">
      <stop stop-color="#22D3EE" stop-opacity=".18"/><stop offset=".55" stop-color="#22D3EE" stop-opacity=".04"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="880 80;820 120;900 100;880 80" dur="18s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="b" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 420) rotate(25) scale(360 210)">
      <stop stop-color="#7C3AED" stop-opacity=".20"/><stop offset=".55" stop-color="#7C3AED" stop-opacity=".045"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="260 420;300 380;240 405;260 420" dur="20s" repeatCount="indefinite"/>
    </radialGradient>
    <linearGradient id="line" x1="230" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/><stop offset=".48" stop-color="#22D3EE"/><stop offset="1" stop-color="#10B981"/>
      <animate attributeName="x1" values="120;260;120" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="850;1030;850" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000" flood-opacity=".38"/></filter>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" seed="9"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer></filter>
    <style>.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,monospace}.chip{transition:opacity .2s ease}.chip:hover{opacity:1}</style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1180" height="520" fill="url(#bg)"/>
    <rect width="1180" height="520" fill="url(#a)"/>
    <rect width="1180" height="520" fill="url(#b)"/>
    <rect width="1180" height="520" filter="url(#noise)" opacity=".22"/>
    <rect x="10.5" y="10.5" width="1159" height="499" rx="32" stroke="rgba(255,255,255,.08)"/>
    <rect x="64" y="62" width="1052" height="396" rx="28" fill="#0F172A" fill-opacity=".58" stroke="rgba(255,255,255,.08)" filter="url(#shadow)"/>
    <path d="M112 352C250 292 352 306 470 328C590 350 704 380 844 326C936 290 1014 232 1070 172" stroke="url(#line)" stroke-width="2" opacity=".55" stroke-linecap="round">
      <animate attributeName="opacity" values=".35;.7;.35" dur="5s" repeatCount="indefinite"/>
    </path>
    <g transform="translate(112 122)">
      <text class="sans" x="0" y="0" font-size="20" font-weight="650" fill="#94A3B8">github.com/anoor3</text>
      <text class="sans" x="0" y="72" font-size="70" font-weight="850" letter-spacing="-2" fill="#F8FAFC">Abdullah Noor</text>
      <text class="sans" x="2" y="122" font-size="28" font-weight="560" fill="#CBD5E1">Full-stack builder focused on AI products, secure tooling, and polished web systems.</text>
      <rect x="2" y="156" width="560" height="3" rx="2" fill="url(#line)">
        <animate attributeName="width" values="120;560;560" keyTimes="0;.65;1" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      <g transform="translate(0 204)" class="sans" font-size="14" font-weight="700" fill="#F8FAFC">
        <g class="chip" opacity=".88"><rect x="0" y="0" width="86" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="43" y="22" text-anchor="middle">React</text></g>
        <g class="chip" opacity=".88"><rect x="98" y="0" width="94" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="145" y="22" text-anchor="middle">Next.js</text></g>
        <g class="chip" opacity=".88"><rect x="204" y="0" width="118" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="263" y="22" text-anchor="middle">TypeScript</text></g>
        <g class="chip" opacity=".88"><rect x="334" y="0" width="88" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="378" y="22" text-anchor="middle">Python</text></g>
        <g class="chip" opacity=".88"><rect x="434" y="0" width="98" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="483" y="22" text-anchor="middle">Postgres</text></g>
        <g class="chip" opacity=".88"><rect x="544" y="0" width="94" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/><text x="591" y="22" text-anchor="middle">Docker</text></g>
      </g>
      <g transform="translate(2 292)" class="mono" font-size="16" fill="#94A3B8">
        <text x="0" y="0">linkedin.com/in/abdullah-noor1</text>
        <text x="0" y="30">abdullahnoorllc@gmail.com</text>
      </g>
    </g>
    <g opacity=".55">
      <circle cx="990" cy="130" r="2" fill="#22D3EE"><animate attributeName="cy" values="130;108;130" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.8;.2" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="1028" cy="396" r="2" fill="#10B981"><animate attributeName="cy" values="396;370;396" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.7;.2" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="420" r="1.7" fill="#7C3AED"><animate attributeName="cy" values="420;392;420" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".1;.65;.1" dur="8s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
